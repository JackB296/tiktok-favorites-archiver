# Boots the official Cobalt instance + this archive app together.
#   docker compose up --build
# Then open http://localhost:8080
services:
  cobalt:
    # Official Cobalt API image. Check https://github.com/imputnet/cobalt
    # (docs/run-an-instance) for the current tag if this one is stale.
    image: ghcr.io/imputnet/cobalt:11
    init: true
    restart: unless-stopped
    environment:
      API_URL: "http://cobalt:9000/"
      # Cobalt's built-in rate limit. Its default (~20 requests/minute) is meant
      # for public instances and makes bulk syncs/backfills crawl: every call
      # gets a 429 and a ~53s backoff. This instance is private (not exposed
      # outside the compose network), so give the app real headroom. The app's
      # own limiter (RATE_MAX_CALLS/RATE_PERIOD below) must stay under this.
      RATELIMIT_MAX: "300"
      RATELIMIT_WINDOW: "60"
    expose:
      - "9000"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - cobalt
    environment:
      COBALT_API_URL: "http://cobalt:9000/"
      DOWNLOAD_DIR: "/app/downloads"
      DB_FILE: "/app/data/archive.db"
      APP_PORT: "8080"
      # Keep this comfortably below Cobalt's RATELIMIT_MAX/WINDOW above:
      # 4 calls/second = 240/minute < Cobalt's 300/minute budget.
      CONCURRENCY: "4"
      RATE_MAX_CALLS: "4"
      RATE_PERIOD: "1.0"
      # Shazam pace: 1 recognition per N seconds. Shazam has no official API and
      # throttles sustained traffic — at 1/2s it began rejecting after ~150
      # requests, so pace bulk identification over a large library gently.
      SONG_ID_RATE_MAX_CALLS: "1"
      SONG_ID_RATE_PERIOD: "6.0"
    ports:
      # Bound to localhost: the app has no authentication, so it should not be
      # reachable from the rest of the network. (Plex reads ./downloads from
      # disk directly and is unaffected.)
      - "127.0.0.1:8080:8080"
    volumes:
      # Media lands here on the host — point Plex at ./downloads.
      - ./downloads:/app/downloads
      # SQLite state (kept off the media folder).
      - ./appdata:/app/data
